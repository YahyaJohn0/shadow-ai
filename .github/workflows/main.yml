name: Build Shadow AI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  release:
    types: [ published ]

jobs:
  build-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: [3.8, 3.9, 3.10, 3.11]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements_dist.txt
        pip install pyinstaller

    - name: Build application
      run: |
        python build_step_by_step.py

    - name: Upload Windows artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ShadowAI-Windows-${{ matrix.python-version }}
        path: |
          dist/ShadowAI/
          dist/ShadowAI_Setup.exe
        retention-days: 30

  build-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        python-version: [3.8, 3.9, 3.10, 3.11]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements_dist.txt
        pip install pyinstaller

    - name: Build macOS application
      run: |
        python -m PyInstaller --clean --noconfirm --windowed --name=ShadowAI run_shadow_gui.py

    - name: Upload macOS artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ShadowAI-macOS-${{ matrix.python-version }}
        path: dist/ShadowAI.app
        retention-days: 30

  build-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.8, 3.9, 3.10, 3.11]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements_dist.txt
        pip install pyinstaller
        sudo apt-get update
        sudo apt-get install -y portaudio19-dev python3-pyaudio

    - name: Build Linux application
      run: |
        python -m PyInstaller --clean --noconfirm --name=shadow-ai run_shadow_gui.py

    - name: Upload Linux artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ShadowAI-Linux-${{ matrix.python-version }}
        path: dist/shadow-ai
        retention-days: 30

  create-release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4

    - name: Display structure of downloaded files
      run: ls -R

    - name: Create Release Bundle
      run: |
        mkdir release-package
        # Copy Windows builds
        find . -name "ShadowAI-Windows*" -type d | head -1 | xargs -I {} cp -r {} release-package/Windows
        # Copy macOS builds  
        find . -name "ShadowAI-macOS*" -type d | head -1 | xargs -I {} cp -r {} release-package/macOS
        # Copy Linux builds
        find . -name "ShadowAI-Linux*" -type d | head -1 | xargs -I {} cp -r {} release-package/Linux
        
        # Create README
        cat > release-package/README.txt << EOF
        Shadow AI - Release ${{ github.ref_name }}
        
        Platform Downloads:
        - Windows: Run ShadowAI_Setup.exe for installation
        - macOS: Use ShadowAI.app (drag to Applications)
        - Linux: Run ./shadow-ai executable
        
        System Requirements:
        - 4GB RAM, 500MB storage
        - Microphone for voice features
        - Internet for web features (optional)
        
        Support: Create an issue at ${{ github.repository }}
        EOF

    - name: Upload Release Assets
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ github.event.release.upload_url }}
        asset_path: ./release-package
        asset_name: ShadowAI-${{ github.ref_name }}-All-Platforms.zip
        asset_content_type: application/zip
